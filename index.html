<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSAC - Estrellitas del Saber</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
}

.pantalla{
display:none;
min-height:100vh;
padding:30px;
}

#bienvenida{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
color:white;
}

.logo{
font-size:80px;
font-weight:bold;
color:#4CAF50;
}

.btn{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:12px;
background:#4CAF50;
color:white;
cursor:pointer;
margin:5px;
}

.back{background:#333;}

.tarjeta{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

h2{color:#003366;}

input{
padding:10px;
margin:5px;
font-size:16px;
width:100%;
box-sizing:border-box;
}

/* CALCULADORA */
.calc{
background:#222;
padding:20px;
border-radius:15px;
color:white;
}

#d{
width:100%;
height:60px;
font-size:30px;
text-align:right;
background:#333;
color:white;
border:none;
border-radius:10px;
padding:10px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
}

.grid button{
height:60px;
font-size:20px;
border:none;
border-radius:10px;
background:#444;
color:white;
}

.grid button:active{background:#666}

.o{background:orange}
.e{background:green;grid-column:span 2}
.c{background:red}
.z{grid-column:span 2}

/* ASISTENTE */
.asistente{
text-align:center;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
padding:20px;
border-radius:15px;
}

#btnMic{
background:white;
border:none;
padding:40px;
border-radius:50%;
font-size:50px;
cursor:pointer;
margin-top:20px;
}

#salida{
margin-top:20px;
font-size:20px;
background:rgba(255,255,255,0.2);
padding:15px;
border-radius:10px;
}

</style>
</head>

<body>

<!-- BIENVENIDA -->
<div id="bienvenida" class="pantalla" style="display:flex;">
<div class="logo">OSAC</div>
<h1>Bienvenidos</h1>
<h2>Estrellitas del Saber</h2>
<button class="btn" onclick="mostrar('menu')">Comenzar ✨</button>
</div>

<!-- MENU -->
<div id="menu" class="pantalla">
<div class="tarjeta">
<button class="btn back" onclick="mostrar('bienvenida')">⬅️ Volver</button>

<h2>Herramientas OSAC</h2>

<button class="btn" onclick="mostrar('calculadora')">🧮 Calculadora</button>
<button class="btn" onclick="mostrar('asistente')">🎤 Asistente de Voz</button>

</div>
</div>

<!-- CALCULADORA -->
<div id="calculadora" class="pantalla">
<div class="tarjeta">
<button class="btn back" onclick="mostrar('menu')">⬅️ Volver</button>

<h2>Calculadora OSAC</h2>

<div class="calc">
<input id="d" readonly>

<div class="grid">
<button class="c" onclick="d.value=''">C</button>
<button onclick="d.value=d.value.slice(0,-1)">⌫</button>
<button onclick="d.value+='%'">%</button>
<button class="o" onclick="d.value+='/'">÷</button>

<button onclick="d.value+='7'">7</button>
<button onclick="d.value+='8'">8</button>
<button onclick="d.value+='9'">9</button>
<button class="o" onclick="d.value+='*'">×</button>

<button onclick="d.value+='4'">4</button>
<button onclick="d.value+='5'">5</button>
<button onclick="d.value+='6'">6</button>
<button class="o" onclick="d.value+='-'">-</button>

<button onclick="d.value+='1'">1</button>
<button onclick="d.value+='2'">2</button>
<button onclick="d.value+='3'">3</button>
<button class="o" onclick="d.value+='+'">+</button>

<button class="z" onclick="d.value+='0'">0</button>
<button onclick="d.value+='.'">.</button>
<button class="e" onclick="try{d.value=eval(d.value)}catch{d.value='Error'}">=</button>
</div>
</div>

</div>
</div>

<!-- ASISTENTE -->
<div id="asistente" class="pantalla">
<div class="tarjeta">
<button class="btn back" onclick="mostrar('menu')">⬅️ Volver</button>

<div class="asistente">
<h2>Asistente de Voz 🎤</h2>
<p>Di: "15 más 8", "20 entre 4", etc</p>

<button id="btnMic">🎤</button>

<div id="salida">Toca el micrófono</div>
</div>
</div>
</div>

<script>

function mostrar(id){
document.querySelectorAll('.pantalla').forEach(p=>p.style.display='none');
document.getElementById(id).style.display='block';
}

/* ===== ASISTENTE ===== */
const btn = document.getElementById('btnMic');
const salida = document.getElementById('salida');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function hablar(texto){
speechSynthesis.cancel();
const voz = new SpeechSynthesisUtterance(texto);
voz.lang='es-ES';
voz.rate=0.9;
speechSynthesis.speak(voz);
}

if(SpeechRecognition){
const recognition = new SpeechRecognition();
recognition.lang='es-ES';

btn.onclick=()=>{
salida.textContent='Escuchando...';
recognition.start();
};

recognition.onresult=(e)=>{
let texto=e.results[0][0].transcript.toLowerCase();
let nums=texto.match(/\d+/g);

if(nums && nums.length>=2){
let n1=parseFloat(nums[0]);
let n2=parseFloat(nums[1]);
let res=0;
let msg='';

if(texto.includes('más')||texto.includes('suma')){
res=n1+n2;
msg=`${n1} más ${n2} es ${res}`;
}
else if(texto.includes('menos')){
res=n1-n2;
msg=`${n1} menos ${n2} es ${res}`;
}
else if(texto.includes('por')){
res=n1*n2;
msg=`${n1} por ${n2} es ${res}`;
}
else if(texto.includes('entre')){
if(n2==0) msg='No se puede dividir entre cero';
else msg=`${n1} entre ${n2} es ${n1/n2}`;
}
else msg='Di más, menos, por o entre';

salida.textContent=msg;
hablar(msg);

}else{
let msg='No entendí los números';
salida.textContent=msg;
hablar(msg);
}
};
}else{
salida.textContent='Tu navegador no soporta micrófono';
}

</script>

</body>
</html>
