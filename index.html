<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSAC - Estrellitas del Saber</title>

<meta name="theme-color" content="#16213e">

<style>
body{
margin:0;
font-family:Arial,sans-serif;
}

.pantalla{
display:none;
min-height:100vh;
padding:25px;
animation:fade .2s ease-in;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* BIENVENIDA */
#bienvenida{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
color:white;
}

.logo{
font-size:80px;
font-weight:bold;
color:#4CAF50;
}

.btn{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:12px;
background:#4CAF50;
color:white;
cursor:pointer;
margin:6px;
}

.back{background:#333;}

.tarjeta{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

h2{color:#003366;}

/* CALCULADORA PRO */
.calc{
background:#1e1e1e;
padding:20px;
border-radius:20px;
max-width:480px;
margin:auto;
color:white;
}

#d{
width:100%;
height:90px;
font-size:45px;
text-align:right;
background:#2b2b2b;
color:white;
border:none;
border-radius:12px;
padding:12px;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.grid button{
height:85px;
font-size:28px;
border:none;
border-radius:12px;
background:#444;
color:white;
}

.grid button:active{background:#666}

.o{background:orange}
.e{background:green;grid-column:span 2}
.c{background:red}
.z{grid-column:span 2}

/* ASISTENTE PRO */
.asistente{
text-align:center;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
padding:25px;
border-radius:20px;
}

#btnMic{
background:white;
border:none;
padding:55px;
border-radius:50%;
font-size:60px;
cursor:pointer;
margin-top:20px;
}

#salida{
margin-top:20px;
font-size:22px;
background:rgba(255,255,255,0.25);
padding:15px;
border-radius:12px;
min-height:70px;
}

</style>
</head>

<body>

<!-- BIENVENIDA -->
<div id="bienvenida" class="pantalla" style="display:flex;">
<div class="logo">OSAC</div>
<h1>Estrellitas del Saber</h1>
<button class="btn" onclick="mostrar('nosotros')">Comenzar ✨</button>
</div>

<!-- NOSOTROS -->
<div id="nosotros" class="pantalla">
<div class="tarjeta">
<button class="btn back" onclick="mostrar('bienvenida')">⬅️ Volver</button>

<h2>Nosotros</h2>
<p>Ayudamos a comerciantes del mercado Unión Dignidad.</p>

<button class="btn" onclick="mostrar('consejos')">Siguiente ➜</button>
</div>
</div>

<!-- CONSEJOS -->
<div id="consejos" class="pantalla">
<div class="tarjeta">
<button class="btn back" onclick="mostrar('nosotros')">⬅️ Volver</button>

<h2>Consejos</h2>
<p>📒 Anota ventas</p>
<p>🧮 Usa calculadora</p>
<p>💰 Ordena dinero</p>

<button class="btn" onclick="mostrar('herramientas')">Siguiente ➜</button>
</div>
</div>

<!-- HERRAMIENTAS -->
<div id="herramientas" class="pantalla">
<div class="tarjeta">
<button class="btn back" onclick="mostrar('consejos')">⬅️ Volver</button>

<h2>Herramientas OSAC</h2>

<button class="btn" onclick="mostrar('calculadora')">🧮 Calculadora PRO</button>
<button class="btn" onclick="mostrar('asistente')">🎤 Asistente IA</button>
</div>
</div>

<!-- CALCULADORA -->
<div id="calculadora" class="pantalla">
<div class="tarjeta">
<button class="btn back" onclick="mostrar('herramientas')">⬅️ Volver</button>

<h2>Calculadora PRO</h2>

<div class="calc">
<input id="d" readonly>

<div class="grid">
<button class="c" onclick="d.value=''">C</button>
<button onclick="d.value=d.value.slice(0,-1)">⌫</button>
<button onclick="d.value+='/'">÷</button>
<button onclick="d.value+='*'">×</button>

<button onclick="d.value+='7'">7</button>
<button onclick="d.value+='8'">8</button>
<button onclick="d.value+='9'">9</button>
<button onclick="d.value+='-'">-</button>

<button onclick="d.value+='4'">4</button>
<button onclick="d.value+='5'">5</button>
<button onclick="d.value+='6'">6</button>
<button onclick="d.value+='+'">+</button>

<button onclick="d.value+='1'">1</button>
<button onclick="d.value+='2'">2</button>
<button onclick="d.value+='3'">3</button>
<button class="e" onclick="try{d.value=eval(d.value)}catch{d.value='Error'}">=</button>

<button class="z" onclick="d.value+='0'">0</button>
<button onclick="d.value+='.'">.</button>
</div>
</div>
</div>
</div>

<!-- ASISTENTE -->
<div id="asistente" class="pantalla">
<div class="tarjeta">
<button class="btn back" onclick="mostrar('herramientas')">⬅️ Volver</button>

<div class="asistente">
<h2>Asistente IA 🎤</h2>
<p>Di: hola, quién eres, ayuda, o cálculos</p>

<button id="btnMic">🎤</button>

<div id="salida">Listo para escuchar</div>
</div>
</div>
</div>

<!-- GRACIAS -->
<div id="gracias" class="pantalla">
<div class="tarjeta" style="text-align:center;">
<h1>¡Gracias por usar OSAC!</h1>

<button class="btn">😞</button>
<button class="btn">🙂</button>
<button class="btn">😃</button>

<button class="btn back" onclick="mostrar('herramientas')">⬅️ Volver</button>
</div>
</div>

<script>

/* ================= NAVEGACIÓN FIABLE ================= */
function mostrar(id){
document.querySelectorAll('.pantalla').forEach(p=>p.style.display='none');
const el=document.getElementById(id);
if(el) el.style.display='block';
}

/* ================= ASISTENTE IA ================= */
const btn=document.getElementById('btnMic');
const salida=document.getElementById('salida');

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;

function hablar(texto){
speechSynthesis.cancel();
const voz=new SpeechSynthesisUtterance(texto);
voz.lang='es-ES';
voz.rate=0.95;
voz.volume=1;
speechSynthesis.speak(voz);
}

if(SpeechRecognition){

const r=new SpeechRecognition();
r.lang='es-ES';

btn.onclick=()=>r.start();

r.onresult=(e)=>{
let t=e.results[0][0].transcript.toLowerCase();
let n=t.match(/\d+/g);

/* CONVERSACIÓN */
if(t.includes("hola")){
salida.textContent="Hola 👋";
hablar("Hola, soy OSAC");
return;
}

if(t.includes("quién eres")){
salida.textContent="Soy OSAC";
hablar("Soy OSAC, tu asistente");
return;
}

if(t.includes("ayuda")){
salida.textContent="Usa números + operación";
hablar("Di dos números y operación");
return;
}

/* OPERACIONES */
if(n && n.length>=2){

let a=+n[0],b=+n[1];
let res;

if(t.includes("más")) res=a+b;
else if(t.includes("menos")) res=a-b;
else if(t.includes("por")) res=a*b;
else if(t.includes("entre")) res=b==0?"Error":a/b;
else res="No entendí";

salida.textContent=res;
hablar("El resultado es " + res);

}else{
salida.textContent="No entendí números";
hablar("No entendí");
}
};

}

</script>

</body>
  </html>
