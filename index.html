<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSAC PRO</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
}

.pantalla{
display:none;
min-height:100vh;
padding:30px;
}

/* BIENVENIDA */
#bienvenida{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
color:white;
}

.logo{
font-size:80px;
font-weight:bold;
color:#4CAF50;
}

.btn{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:12px;
background:#4CAF50;
color:white;
cursor:pointer;
margin:5px;
}

.back{background:#333;}

.tarjeta{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

h2{color:#003366;}

/* ================= CALCULADORA GRANDE ================= */
.calc{
background:#222;
padding:25px;
border-radius:20px;
color:white;
max-width:450px;
margin:auto;
}

#d{
width:100%;
height:80px;
font-size:40px;
text-align:right;
background:#333;
color:white;
border:none;
border-radius:12px;
padding:15px;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.grid button{
height:80px;
font-size:26px;
border:none;
border-radius:12px;
background:#444;
color:white;
cursor:pointer;
}

.grid button:active{background:#666}

.o{background:orange}
.e{background:green;grid-column:span 2}
.c{background:red}
.z{grid-column:span 2}

/* ================= ASISTENTE ================= */
.asistente{
text-align:center;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
padding:25px;
border-radius:20px;
}

#btnMic{
background:white;
border:none;
padding:50px;
border-radius:50%;
font-size:60px;
cursor:pointer;
margin-top:20px;
}

#salida{
margin-top:20px;
font-size:22px;
background:rgba(255,255,255,0.25);
padding:15px;
border-radius:12px;
min-height:70px;
}

</style>
</head>

<body>

<!-- BIENVENIDA -->
<div id="bienvenida" class="pantalla" style="display:flex;">
<div class="logo">OSAC</div>
<h1>Estrellitas del Saber</h1>
<button class="btn" onclick="mostrar('menu')">Comenzar ✨</button>
</div>

<!-- MENU -->
<div id="menu" class="pantalla">
<div class="tarjeta">
<button class="btn back" onclick="mostrar('bienvenida')">⬅️ Volver</button>

<h2>Herramientas PRO</h2>

<button class="btn" onclick="mostrar('calculadora')">🧮 Calculadora PRO</button>
<button class="btn" onclick="mostrar('asistente')">🎤 Asistente IA</button>

</div>
</div>

<!-- CALCULADORA -->
<div id="calculadora" class="pantalla">
<div class="tarjeta">
<button class="btn back" onclick="mostrar('menu')">⬅️ Volver</button>

<h2>Calculadora PRO</h2>

<div class="calc">
<input id="d" readonly>

<div class="grid">
<button class="c" onclick="d.value=''">C</button>
<button onclick="d.value=d.value.slice(0,-1)">⌫</button>
<button onclick="d.value+='%'">%</button>
<button class="o" onclick="d.value+='/'">÷</button>

<button onclick="d.value+='7'">7</button>
<button onclick="d.value+='8'">8</button>
<button onclick="d.value+='9'">9</button>
<button class="o" onclick="d.value+='*'">×</button>

<button onclick="d.value+='4'">4</button>
<button onclick="d.value+='5'">5</button>
<button onclick="d.value+='6'">6</button>
<button class="o" onclick="d.value+='-'">-</button>

<button onclick="d.value+='1'">1</button>
<button onclick="d.value+='2'">2</button>
<button onclick="d.value+='3'">3</button>
<button class="o" onclick="d.value+='+'">+</button>

<button class="z" onclick="d.value+='0'">0</button>
<button onclick="d.value+='.'">.</button>
<button class="e" onclick="try{d.value=eval(d.value)}catch{d.value='Error'}">=</button>
</div>
</div>

</div>
</div>

<!-- ASISTENTE -->
<div id="asistente" class="pantalla">
<div class="tarjeta">
<button class="btn back" onclick="mostrar('menu')">⬅️ Volver</button>

<div class="asistente">
<h2>Asistente IA 🎤</h2>
<p>Di: “hola”, “15 más 8”, “quién eres”</p>

<button id="btnMic">🎤</button>

<div id="salida">Toca el micrófono</div>
</div>
</div>
</div>

<script>

function mostrar(id){
document.querySelectorAll('.pantalla').forEach(p=>p.style.display='none');
document.getElementById(id).style.display='block';
}

/* ================= VOZ ================= */
const btn = document.getElementById('btnMic');
const salida = document.getElementById('salida');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

/* VOZ MÁS FUERTE Y NATURAL */
function hablar(texto){
speechSynthesis.cancel();

const voz = new SpeechSynthesisUtterance(texto);
voz.lang='es-ES';
voz.rate=0.95;
voz.pitch=1;
voz.volume=1; // 🔊 MÁS FUERTE

speechSynthesis.speak(voz);
}

if(SpeechRecognition){

const recognition = new SpeechRecognition();
recognition.lang='es-ES';

btn.onclick=()=>{
salida.textContent='Escuchando...';
recognition.start();
};

/* ===== INTELIGENCIA BÁSICA ===== */
recognition.onresult=(e)=>{
let texto=e.results[0][0].transcript.toLowerCase();

let nums=texto.match(/\d+/g);

/* ===== SALUDOS Y CONVERSACIÓN ===== */
if(texto.includes("hola")){
let msg="Hola 👋, soy tu asistente OSAC. Estoy listo para ayudarte con cálculos.";
salida.textContent=msg;
hablar(msg);
return;
}

if(texto.includes("quién eres")){
let msg="Soy OSAC, un asistente creado para ayudarte a calcular y aprender.";
salida.textContent=msg;
hablar(msg);
return;
}

if(texto.includes("ayuda")){
let msg="Puedes decir: suma, resta, por o entre, o decir dos números.";
salida.textContent=msg;
hablar(msg);
return;
}

/* ===== OPERACIONES ===== */
if(nums && nums.length>=2){

let n1=parseFloat(nums[0]);
let n2=parseFloat(nums[1]);
let msg="";

if(texto.includes('más')||texto.includes('suma')){
msg=`${n1} más ${n2} es ${n1+n2}`;
}
else if(texto.includes('menos')){
msg=`${n1} menos ${n2} es ${n1-n2}`;
}
else if(texto.includes('por')){
msg=`${n1} por ${n2} es ${n1*n2}`;
}
else if(texto.includes('entre')){
if(n2==0) msg="No se puede dividir entre cero";
else msg=`${n1} entre ${n2} es ${n1/n2}`;
}
else{
msg="Di: más, menos, por o entre";
}

salida.textContent=msg;
hablar(msg);

}else{
let msg="No entendí. Intenta decir dos números.";
salida.textContent=msg;
hablar(msg);
}
};

}else{
salida.textContent="Tu navegador no soporta voz";
}

</script>

</body>
</html>
